<div class="planilla-page">

  <!-- FONDO -->
  <div class="bg-decor"></div>

  <div class="content-wrapper">

    <!-- HEADER -->
    <div class="page-header">
      <div class="icon-box">
        <span class="material-symbols-outlined">assignment</span>
      </div>
      <div>
        <h1>Registro de Planilla</h1>
        <p>Gestión operativa de flota en tiempo real</p>
      </div>
    </div>

    <!-- CARD -->
    <div class="form-card-dashboard">

      <!-- MODAL -->
      <div *ngIf="tipoMensaje" class="modal-backdrop">
        <div class="modal">
          <div class="modal-header">
            <span class="material-symbols-outlined">
              {{ tipoMensaje === 'success' ? 'check_circle' : 'error' }}
            </span>
            <h3>{{ tipoMensaje === 'success' ? 'Éxito' : 'Error' }}</h3>
          </div>

          <div class="modal-body">
            {{ mensaje }}
          </div>

          <div class="modal-footer">
            <button (click)="cerrarModal()">Cerrar</button>
          </div>
        </div>
      </div>

      <!-- FORM -->
      <form [formGroup]="formPlanillaje" (ngSubmit)="registrarPlanillaje()">

        <!-- PLACA -->
        <div class="field-group">
          <label class="field-label">Placa del Vehículo</label>
          <div class="input-wrapper">
            <span class="material-symbols-outlined input-icon">minor_crash</span>
            <input
              type="text"
              formControlName="placa"
              placeholder="ABC123"
              class="form-input"
              maxlength="6"
              minlength="6"
              (input)="normalizarPlaca()"
            />
          </div>

          <small *ngIf="formPlanillaje.get('placa')?.invalid && formPlanillaje.get('placa')?.touched" class="error-msg">
            {{ obtenerMensajePlaca() }}
          </small>
        </div>

        <!-- NOVEDADES -->
        <div class="field-group">
          <label class="field-label">Novedades de Planilla</label>
          <select formControlName="novedadesPlanillaje" class="form-select">
            <option value="" disabled selected>Seleccione una novedad...</option>
            <option value="OK">OK</option>
            <option value="RAYON">RAYON</option>
            <option value="ABOLLADURA">ABOLLADURA</option>
            <option value="OTRO">OTRO</option>
          </select>
        </div>

        <!-- DETALLE -->
        <div class="field-group" *ngIf="formPlanillaje.get('novedadesPlanillaje')?.value === 'OTRO'">
          <label class="field-label">Detalle</label>
          <textarea formControlName="detalle" class="form-textarea"
            placeholder="Describe la novedad..." rows="3"></textarea>
        </div>

        <!-- FOTOS -->
        <div class="field-group">
          <label class="field-label">Evidencia Fotográfica (Máx 6)</label>

          <button
            type="button"
            class="btn-secondary"
            (click)="cameraInput.click()"
            *ngIf="listaFotos.length < 6"
            [disabled]="isLoadingFoto"
          >
            <span class="material-symbols-outlined">add_a_photo</span>
            {{ isLoadingFoto ? 'Procesando foto...' : 'Tomar Foto' }}
          </button>

          <small *ngIf="isLoadingFoto" class="photo-loading">
            Optimizando imagen para enviar más rápido.
          </small>

          <input #cameraInput type="file" accept="image/*" capture="environment"
            (change)="onFotoCapturada($event)" hidden>

          <div class="foto-grid">
            <div *ngFor="let foto of listaFotos; let i = index" class="foto-item">
              <img [src]="foto">
              <button type="button" (click)="eliminarFoto(i)" class="delete-btn">
                <span class="material-symbols-outlined">close</span>
              </button>
            </div>
          </div>
        </div>

        <!-- BOTÓN -->
        <button type="submit" [disabled]="formPlanillaje.invalid" class="btn-submit">
          Registrar Planilla
          <span class="material-symbols-outlined">assignment_turned_in</span>
        </button>

      </form>

    </div>
  </div>
</div>
