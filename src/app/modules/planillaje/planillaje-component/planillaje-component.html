<div class="form-container-centered">
  <div class="form-card-dashboard animate-in">
    <div class="form-header">
      <h2>Registro de Planilla</h2>
      <p>Gestión operativa de flota en tiempo real</p>
    </div>
    <div *ngIf="tipoMensaje" class="modal-backdrop">

      <div class="modal">

        <div class="modal-header">
          <span class="material-symbols-outlined">
            {{ tipoMensaje === 'success' ? 'check_circle' : 'error' }}
          </span>

          <h3>
            {{ tipoMensaje === 'success' ? 'Éxito' : 'Error' }}
          </h3>
        </div>

        <div class="modal-body">
          {{ mensaje }}
        </div>

        <div class="modal-footer">
          <button (click)="cerrarModal()">Cerrar</button>
        </div>

      </div>

    </div>
    <form [formGroup]="formPlanillaje" (ngSubmit)="registrarPlanillaje()">

      <div class="field-group">
        <label class="field-label">Placa del Vehículo</label>
        <div class="input-wrapper">
          <span class="material-symbols-outlined input-icon">minor_crash</span>
          <input type="text" formControlName="placa" placeholder="ABC-1234" class="form-input" />
        </div>
        <small *ngIf="formPlanillaje.get('placa')?.invalid && formPlanillaje.get('placa')?.touched" class="error-msg">
          La placa es requerida para el registro.
        </small>
      </div>

      <div class="field-group">
        <label class="field-label">Novedades de Planilla</label>
        <select formControlName="novedadesPlanillaje" class="form-select">
          <option value="" disabled selected>Seleccione una novedad...</option>
          <option value="OK">OK</option>
          <option value="RAYON">RAYON</option>
          <option value="ABOLLADURA">ABOLLADURA</option>
          <option value="OTRO">OTRO</option>
        </select>
      </div>

      <div class="field-group animate-in" *ngIf="formPlanillaje.get('novedadesPlanillaje')?.value === 'OTRO'">
        <label class="field-label">Detalle (Especifique la novedad)</label>
        <textarea formControlName="detalle" class="form-textarea"
          placeholder="Describa el detalle de la novedad encontrada..." rows="3">
        </textarea>
      </div>

      <div class="field-group">
        <label class="field-label">Evidencia Fotográfica (Máximo 6)</label>

        <button type="button" class="btn-secondary" (click)="cameraInput.click()" *ngIf="listaFotos.length < 6"
          style="width: 100%; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 8px;">
          <span class="material-symbols-outlined">add_a_photo</span>
          Tomar Foto
        </button>

        <input #cameraInput type="file" accept="image/*" capture="environment" (change)="onFotoCapturada($event)"
          style="display: none;">

        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;">
          <div *ngFor="let foto of listaFotos; let i = index"
            style="position: relative; aspect-ratio: 1/1; border: 1px solid #ddd; border-radius: 8px; overflow: hidden;">
            <img [src]="foto" style="width: 100%; height: 100%; object-fit: cover;">
            <button type="button" (click)="eliminarFoto(i)"
              style="position: absolute; top: 2px; right: 2px; background: rgba(255,0,0,0.7); color: white; border: none; border-radius: 50%; cursor: pointer; padding: 2px;">
              <span class="material-symbols-outlined" style="font-size: 16px;">close</span>
            </button>
          </div>
        </div>
      </div>

      <button type="submit" [disabled]="formPlanillaje.invalid" class="btn-submit">
        Registrar Planilla
        <span class="material-symbols-outlined">assignment_turned_in</span>
      </button>
    </form>
  </div>
</div>
