<div class="contenedor-doble">

  <!-- IZQUIERDA -->
  <div class="panel card">

    <div class="panel-header">
      <span class="material-symbols-outlined icon">business</span>
      <div>
        <h2>Nuevo Puesto</h2>
        <p>Registra un nuevo punto operativo</p>
      </div>
    </div>

    <p *ngIf="mensajeExit" class="alert success">{{ mensajeExit }}</p>
    <p *ngIf="errorMensaje" class="alert error">{{ errorMensaje }}</p>

    <form [formGroup]="formsPuestos" (ngSubmit)="registrarPuesto()">

      <div class="campo">
        <label>Nombre del Puesto</label>
        <input type="text" formControlName="nombrePuesto" placeholder="Ej: Terminal Norte">
      </div>

      <div class="campo">
        <label>Dirección</label>
        <input type="text" formControlName="direccion" placeholder="Calle 123 #45-67">
      </div>

      <div class="campo">
        <label>Total de Parqueaderos</label>
        <input type="number" formControlName="totalParqueaderos" placeholder="Ej: 50">
      </div>

      <button type="submit" [disabled]="formsPuestos.invalid" class="btn-primary">
        Guardar Puesto
      </button>

    </form>
  </div>

  <!-- DERECHA -->
  <div class="panel card">

    <div class="panel-header">
      <span class="material-symbols-outlined icon">local_parking</span>
      <div>
        <h2>Parqueaderos</h2>
        <p>Genera espacios automáticamente</p>
      </div>
    </div>

    <p *ngIf="mensajeExitParqueaderos" class="alert success">{{ mensajeExitParqueaderos }}</p>
    <p *ngIf="errorMensajeParqueaderos" class="alert error">{{ errorMensajeParqueaderos }}</p>

    <div class="campo">
      <label>Seleccionar Puesto</label>
      <select [(ngModel)]="puestoSeleccionado">
        <option value="">Seleccione un puesto</option>
        <option *ngFor="let p of puestos" [value]="p.id">
          {{ p.nombrePuesto }}
        </option>
      </select>
    </div>

    <button 
      class="btn-secondary"
      [disabled]="!puestoSeleccionado"
      (click)="crearParqueaderos()">
      Generar Parqueaderos
    </button>

  </div>

</div>
