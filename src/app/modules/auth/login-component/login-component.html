<main class="login-page">

  <div class="background-blur"></div>

  <div class="login-container">

    <!-- LOGO -->
    <div class="logo-section">
      <div class="logo-box">
        <span class="material-symbols-outlined">local_shipping</span>
      </div>
      <h1>Planillaje Vehicular</h1>
      <p>Gestión de flota inteligente</p>
    </div>

    <!-- CARD -->
    <div class="login-card">

      <h2>Bienvenido de nuevo</h2>
      <p class="subtitle">Ingresa tus credenciales para continuar</p>

      <form [formGroup]="loginForm" (ngSubmit)="loginSesion()">

        <!-- USER -->
        <label>Usuario</label>
        <div class="input-group">
          <span class="material-symbols-outlined">person</span>
          <input
            type="text"
            formControlName="username"
            placeholder="nombre.apellido"
            [class.invalid]="loginForm.get('username')?.touched && loginForm.get('username')?.invalid"
          >
        </div>

        <!-- PASSWORD -->
        <label>Contraseña</label>
        <div class="input-group">
          <span class="material-symbols-outlined">lock</span>
          <input
            type="password"
            formControlName="password"
            placeholder="••••••••"
            [class.invalid]="loginForm.get('password')?.touched && loginForm.get('password')?.invalid"
          >
        
        </div>

        <div class="forgot">
          <a href="#">¿Olvidaste tu contraseña?</a>
        </div>

        

        <button type="submit" [disabled]="loginForm.pending">
          Iniciar sesión →
        </button>

      </form>

      <div class="divider">¿ERES NUEVO AQUÍ?</div>

      <p class="register">
        ¿Deseas registrar tu flota?
        <a routerLink="/registrar-empresa">Crear empresa</a>
      </p>

    </div>

    <div class="footer">
      Logistics Corp — v1.0.4
    </div>

  </div>

</main>
